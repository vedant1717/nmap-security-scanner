<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NMAP Security Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            max-width: 400px;
            margin: 10vh auto;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: var(--accent-blue);
            background: rgba(0, 0, 0, 0.4);
        }
        .alert {
            background: rgba(248, 81, 73, 0.15);
            color: var(--critical-color);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        .login-btn { width: 100%; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="container login-container">
        <div class="glass-panel">
            <h2>Access Scanner</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">Login to System</button>
            </form>
        </div>
    </div>
    
    <footer class="text-center" style="margin-top: 2rem; padding: 1rem; color: var(--text-secondary); font-size: 0.875rem;">
        &copy; Copyright at Vedant Patil
    </footer>
</body>
</html>
